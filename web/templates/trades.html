{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Filters -->
    <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <div class="flex flex-wrap items-center gap-4">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-medium text-slate-400 mb-1">Date Range</label>
                <div class="flex items-center space-x-2">
                    <input type="date" id="filter-start" class="flex-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                    <span class="text-slate-500">to</span>
                    <input type="date" id="filter-end" class="flex-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
            </div>
            
            <div class="w-40">
                <label class="block text-xs font-medium text-slate-400 mb-1">Symbol</label>
                <input type="text" id="filter-symbol" placeholder="e.g., AAPL" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500">
            </div>
            
            <div class="w-32">
                <label class="block text-xs font-medium text-slate-400 mb-1">Side</label>
                <select id="filter-side" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                    <option value="">All</option>
                    <option value="buy">Buy</option>
                    <option value="sell">Sell</option>
                </select>
            </div>
            
            <div class="w-32">
                <label class="block text-xs font-medium text-slate-400 mb-1">Result</label>
                <select id="filter-result" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                    <option value="">All</option>
                    <option value="profit">Profit</option>
                    <option value="loss">Loss</option>
                </select>
            </div>
            
            <div class="flex items-end space-x-2">
                <button onclick="applyFilters()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-sm font-medium rounded-lg transition-colors">
                    Apply
                </button>
                <button onclick="resetFilters()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-sm font-medium rounded-lg transition-colors">
                    Reset
                </button>
            </div>
        </div>
    </div>
    
    <!-- Summary Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <p class="text-xs font-medium text-slate-400">Total Trades</p>
            <p id="stats-total" class="text-xl font-bold mt-1">--</p>
        </div>
        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <p class="text-xs font-medium text-slate-400">Win Rate</p>
            <p id="stats-winrate" class="text-xl font-bold mt-1 text-primary-400">--%</p>
        </div>
        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <p class="text-xs font-medium text-slate-400">Total P&L</p>
            <p id="stats-pnl" class="text-xl font-bold mt-1">$--</p>
        </div>
        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <p class="text-xs font-medium text-slate-400">Avg. Trade</p>
            <p id="stats-avg" class="text-xl font-bold mt-1">$--</p>
        </div>
    </div>
    
    <!-- Trades Table -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
        <div class="p-4 border-b border-slate-700 flex items-center justify-between">
            <h2 class="text-lg font-semibold">Trade History</h2>
            <button onclick="exportTrades()" class="flex items-center text-sm text-primary-400 hover:text-primary-300 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Export CSV
            </button>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="bg-slate-700/50">
                        <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider cursor-pointer hover:text-white" onclick="sortTable('date')">
                            Date
                            <svg class="w-3 h-3 inline ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                            </svg>
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Symbol</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Side</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-slate-400 uppercase tracking-wider">Entry</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-slate-400 uppercase tracking-wider">Exit</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-slate-400 uppercase tracking-wider cursor-pointer hover:text-white" onclick="sortTable('pnl_percent')">
                            P&L %
                            <svg class="w-3 h-3 inline ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                            </svg>
                        </th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-slate-400 uppercase tracking-wider">P&L $</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Reason</th>
                    </tr>
                </thead>
                <tbody id="trades-tbody" class="divide-y divide-slate-700">
                    <tr>
                        <td colspan="8" class="px-4 py-12 text-center text-slate-500">
                            <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                            <p>Loading trade history...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Pagination -->
        <div class="p-4 border-t border-slate-700 flex items-center justify-between">
            <div class="text-sm text-slate-400">
                Showing <span id="pagination-start">0</span>-<span id="pagination-end">0</span> of <span id="pagination-total">0</span> trades
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="prevPage()" id="btn-prev" class="px-3 py-1.5 text-sm bg-slate-700 hover:bg-slate-600 rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Previous
                </button>
                <span id="pagination-pages" class="px-3 py-1.5 text-sm text-slate-400">Page 1</span>
                <button onclick="nextPage()" id="btn-next" class="px-3 py-1.5 text-sm bg-slate-700 hover:bg-slate-600 rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Next
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;
    let pageSize = 20;
    let sortField = 'date';
    let sortDirection = 'desc';
    
    document.addEventListener('DOMContentLoaded', function() {
        // Set default date range (last 30 days)
        const endDate = new Date();
        const startDate = new Date();
        startDate.setDate(startDate.getDate() - 30);
        
        document.getElementById('filter-end').value = endDate.toISOString().split('T')[0];
        document.getElementById('filter-start').value = startDate.toISOString().split('T')[0];
        
        loadTrades();
    });
    
    async function loadTrades() {
        const params = new URLSearchParams({
            page: currentPage,
            limit: pageSize,
            sort: sortField,
            direction: sortDirection
        });
        
        const startDate = document.getElementById('filter-start').value;
        const endDate = document.getElementById('filter-end').value;
        const symbol = document.getElementById('filter-symbol').value;
        const side = document.getElementById('filter-side').value;
        const result = document.getElementById('filter-result').value;
        
        if (startDate) params.append('start_date', startDate);
        if (endDate) params.append('end_date', endDate);
        if (symbol) params.append('symbol', symbol.toUpperCase());
        if (side) params.append('side', side);
        if (result) params.append('result', result);
        
        try {
            const data = await apiCall(`/api/v1/metrics/trades?${params.toString()}`);
            if (data) {
                updateTradesTable(data.trades || []);
                updateStats(data.stats || {});
                updatePagination(data.pagination || {});
            }
        } catch (error) {
            console.error('Error loading trades:', error);
        }
    }
    
    function updateTradesTable(trades) {
        const tbody = document.getElementById('trades-tbody');
        
        if (!trades || trades.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="px-4 py-12 text-center text-slate-500">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>No trades found</p>
                        <p class="text-sm mt-1">Adjust your filters or wait for trading activity</p>
                    </td>
                </tr>
            `;
            return;
        }
        
        tbody.innerHTML = trades.map(trade => {
            const pnlPercent = trade.realized_pnl_percent || 0;
            const pnlDollar = trade.realized_pnl || 0;
            const isPositive = pnlPercent >= 0;
            
            const reasonLabels = {
                TARGET: 'Target Hit',
                STOP_LOSS: 'Stop Loss',
                FRIDAY_CLOSE: 'Friday Close',
                MANUAL: 'Manual',
                HALT: 'Halt',
                NEWS: 'News Event'
            };
            
            const reasonColors = {
                TARGET: 'bg-green-900/50 text-green-400',
                STOP_LOSS: 'bg-red-900/50 text-red-400',
                FRIDAY_CLOSE: 'bg-blue-900/50 text-blue-400',
                MANUAL: 'bg-slate-700 text-slate-300',
                HALT: 'bg-yellow-900/50 text-yellow-400',
                NEWS: 'bg-purple-900/50 text-purple-400'
            };
            
            return `
                <tr class="hover:bg-slate-700/30 transition-colors">
                    <td class="px-4 py-4 text-slate-300">${formatDate(trade.exit_date || trade.entry_date)}</td>
                    <td class="px-4 py-4">
                        <span class="font-bold text-primary-400">${trade.symbol}</span>
                    </td>
                    <td class="px-4 py-4">
                        <span class="px-2 py-0.5 text-xs font-medium rounded ${trade.side === 'buy' ? 'bg-green-900/50 text-green-400' : 'bg-red-900/50 text-red-400'}">
                            ${trade.side?.toUpperCase() || 'BUY'}
                        </span>
                    </td>
                    <td class="px-4 py-4 text-right text-slate-300">${formatCurrency(trade.entry_price)}</td>
                    <td class="px-4 py-4 text-right text-slate-300">${formatCurrency(trade.exit_price)}</td>
                    <td class="px-4 py-4 text-right">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-sm font-medium ${isPositive ? 'bg-green-900/50 text-green-400' : 'bg-red-900/50 text-red-400'}">
                            ${isPositive ? '+' : ''}${pnlPercent.toFixed(2)}%
                        </span>
                    </td>
                    <td class="px-4 py-4 text-right font-medium ${isPositive ? 'text-green-400' : 'text-red-400'}">
                        ${isPositive ? '+' : ''}${formatCurrency(pnlDollar)}
                    </td>
                    <td class="px-4 py-4">
                        <span class="px-2 py-0.5 text-xs font-medium rounded ${reasonColors[trade.exit_reason] || 'bg-slate-700 text-slate-300'}">
                            ${reasonLabels[trade.exit_reason] || trade.exit_reason || 'N/A'}
                        </span>
                    </td>
                </tr>
            `;
        }).join('');
    }
    
    function updateStats(stats) {
        document.getElementById('stats-total').textContent = stats.total_trades || 0;
        
        const winRate = (stats.win_rate || 0) * 100;
        document.getElementById('stats-winrate').textContent = winRate.toFixed(1) + '%';
        
        const totalPnl = stats.total_pnl || 0;
        const pnlEl = document.getElementById('stats-pnl');
        pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + formatCurrency(totalPnl);
        pnlEl.className = `text-xl font-bold mt-1 ${totalPnl >= 0 ? 'text-green-400' : 'text-red-400'}`;
        
        const avgTrade = stats.avg_trade || 0;
        const avgEl = document.getElementById('stats-avg');
        avgEl.textContent = (avgTrade >= 0 ? '+' : '') + formatCurrency(avgTrade);
        avgEl.className = `text-xl font-bold mt-1 ${avgTrade >= 0 ? 'text-green-400' : 'text-red-400'}`;
    }
    
    function updatePagination(pagination) {
        currentPage = pagination.page || 1;
        totalPages = pagination.total_pages || 1;
        const total = pagination.total || 0;
        
        const start = total === 0 ? 0 : (currentPage - 1) * pageSize + 1;
        const end = Math.min(currentPage * pageSize, total);
        
        document.getElementById('pagination-start').textContent = start;
        document.getElementById('pagination-end').textContent = end;
        document.getElementById('pagination-total').textContent = total;
        document.getElementById('pagination-pages').textContent = `Page ${currentPage} of ${totalPages}`;
        
        document.getElementById('btn-prev').disabled = currentPage <= 1;
        document.getElementById('btn-next').disabled = currentPage >= totalPages;
    }
    
    function applyFilters() {
        currentPage = 1;
        loadTrades();
    }
    
    function resetFilters() {
        const endDate = new Date();
        const startDate = new Date();
        startDate.setDate(startDate.getDate() - 30);
        
        document.getElementById('filter-end').value = endDate.toISOString().split('T')[0];
        document.getElementById('filter-start').value = startDate.toISOString().split('T')[0];
        document.getElementById('filter-symbol').value = '';
        document.getElementById('filter-side').value = '';
        document.getElementById('filter-result').value = '';
        
        currentPage = 1;
        sortField = 'date';
        sortDirection = 'desc';
        loadTrades();
    }
    
    function sortTable(field) {
        if (sortField === field) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            sortField = field;
            sortDirection = 'desc';
        }
        loadTrades();
    }
    
    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            loadTrades();
        }
    }
    
    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            loadTrades();
        }
    }
    
    async function exportTrades() {
        const params = new URLSearchParams({ format: 'csv' });
        
        const startDate = document.getElementById('filter-start').value;
        const endDate = document.getElementById('filter-end').value;
        const symbol = document.getElementById('filter-symbol').value;
        
        if (startDate) params.append('start_date', startDate);
        if (endDate) params.append('end_date', endDate);
        if (symbol) params.append('symbol', symbol.toUpperCase());
        
        try {
            const token = localStorage.getItem('access_token');
            const response = await fetch(`/api/v1/metrics/trades/export?${params.toString()}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `trades_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                window.URL.revokeObjectURL(url);
                showToast('Export downloaded', 'success');
            } else {
                showToast('Export failed', 'error');
            }
        } catch (error) {
            showToast('Export failed', 'error');
        }
    }
</script>
{% endblock %}
