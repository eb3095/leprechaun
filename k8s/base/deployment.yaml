apiVersion: apps/v1
kind: Deployment
metadata:
  name: leprechaun-api
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun-api
    app.kubernetes.io/part-of: leprechaun
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: leprechaun-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: leprechaun-api
        app.kubernetes.io/part-of: leprechaun
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: leprechaun-api
          image: ghcr.io/together/leprechaun:latest
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: leprechaun-config
            - secretRef:
                name: leprechaun-secrets
          env:
            - name: DATABASE_HOST
              value: leprechaun-db-primary.leprechaun.svc.cluster.local
            - name: DATABASE_PORT
              value: "3306"
            - name: DATABASE_NAME
              value: leprechaun
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-user
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-user
                  key: password
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
