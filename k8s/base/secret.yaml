# Placeholder secrets for Leprechaun trading bot
# WARNING: Do not commit real values to version control!
# 
# For production deployments, use one of the following approaches:
# - External Secrets Operator: https://external-secrets.io
# - Sealed Secrets: https://sealed-secrets.netlify.app
# - Vault with Kubernetes auth
#
# Example with External Secrets:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: leprechaun-secrets
# spec:
#   secretStoreRef:
#     name: vault-backend
#     kind: ClusterSecretStore
#   target:
#     name: leprechaun-secrets
#   data:
#     - secretKey: ALPACA_API_KEY
#       remoteRef:
#         key: leprechaun/alpaca
#         property: api_key
---
apiVersion: v1
kind: Secret
metadata:
  name: leprechaun-secrets
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun
    app.kubernetes.io/part-of: leprechaun
type: Opaque
stringData:
  # Alpaca Trading API
  ALPACA_API_KEY: "<REPLACE_WITH_ALPACA_API_KEY>"
  ALPACA_API_SECRET: "<REPLACE_WITH_ALPACA_API_SECRET>"
  ALPACA_PAPER: "true"

  # Reddit API (PRAW)
  REDDIT_CLIENT_ID: "<REPLACE_WITH_REDDIT_CLIENT_ID>"
  REDDIT_CLIENT_SECRET: "<REPLACE_WITH_REDDIT_CLIENT_SECRET>"
  REDDIT_USER_AGENT: "leprechaun-bot/1.0"

  # Finnhub API
  FINNHUB_API_KEY: "<REPLACE_WITH_FINNHUB_API_KEY>"

  # StockTwits via RapidAPI
  RAPIDAPI_KEY: "<REPLACE_WITH_RAPIDAPI_KEY>"

  # Discord Webhook
  DISCORD_WEBHOOK_URL: "<REPLACE_WITH_DISCORD_WEBHOOK_URL>"

  # JWT Secret for API authentication
  JWT_SECRET_KEY: "<REPLACE_WITH_SECURE_RANDOM_STRING>"

  # Firebase (optional, for push notifications)
  # FIREBASE_CREDENTIALS: "<REPLACE_WITH_BASE64_ENCODED_SERVICE_ACCOUNT_JSON>"
