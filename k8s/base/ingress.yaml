apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leprechaun-api
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun-api
    app.kubernetes.io/part-of: leprechaun
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: leprechaun-headers@kubernetescrd
    # For TLS with cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - leprechaun.example.com
      secretName: leprechaun-tls
  rules:
    - host: leprechaun.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: leprechaun-api
                port:
                  number: 80
---
# Traefik Middleware for security headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: leprechaun-headers
  namespace: leprechaun
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    customFrameOptionsValue: "SAMEORIGIN"
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
    customResponseHeaders:
      X-Robots-Tag: "noindex,nofollow"
