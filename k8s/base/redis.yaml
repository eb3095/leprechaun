apiVersion: apps/v1
kind: Deployment
metadata:
  name: leprechaun-redis
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun-redis
    app.kubernetes.io/part-of: leprechaun
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: leprechaun-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: leprechaun-redis
        app.kubernetes.io/part-of: leprechaun
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: leprechaun-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leprechaun-redis-pvc
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun-redis
    app.kubernetes.io/part-of: leprechaun
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: leprechaun-redis
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun-redis
    app.kubernetes.io/part-of: leprechaun
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: leprechaun-redis
