# MariaDB secrets for Leprechaun trading bot
# WARNING: Do not commit real values to version control!
#
# For production deployments, use one of the following approaches:
# - External Secrets Operator: https://external-secrets.io
# - Sealed Secrets: https://sealed-secrets.netlify.app
# - Vault with Kubernetes auth
#
# Generate secure passwords:
#   openssl rand -base64 32
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-root
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun-db
    app.kubernetes.io/part-of: leprechaun
    app.kubernetes.io/component: database
type: Opaque
stringData:
  password: "<REPLACE_WITH_SECURE_ROOT_PASSWORD>"
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-user
  namespace: leprechaun
  labels:
    app.kubernetes.io/name: leprechaun-db
    app.kubernetes.io/part-of: leprechaun
    app.kubernetes.io/component: database
type: Opaque
stringData:
  username: leprechaun
  password: "<REPLACE_WITH_SECURE_USER_PASSWORD>"
