{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "leprechaun.fullname" . }}-api
  namespace: {{ include "leprechaun.namespace" . }}
  labels:
    {{- include "leprechaun.apiLabels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.middleware.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ include "leprechaun.namespace" . }}-{{ include "leprechaun.fullname" . }}-headers@kubernetescrd
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "leprechaun.fullname" $ }}-api
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
---
{{- if .Values.ingress.middleware.enabled }}
# Traefik Middleware for security headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "leprechaun.fullname" . }}-headers
  namespace: {{ include "leprechaun.namespace" . }}
  labels:
    {{- include "leprechaun.apiLabels" . | nindent 4 }}
spec:
  headers:
    stsSeconds: {{ .Values.ingress.middleware.headers.stsSeconds | default 31536000 }}
    stsIncludeSubdomains: {{ .Values.ingress.middleware.headers.stsIncludeSubdomains | default true }}
    stsPreload: true
    forceSTSHeader: {{ .Values.ingress.middleware.headers.forceSTSHeader | default true }}
    customFrameOptionsValue: "SAMEORIGIN"
    contentTypeNosniff: {{ .Values.ingress.middleware.headers.contentTypeNosniff | default true }}
    browserXssFilter: {{ .Values.ingress.middleware.headers.browserXssFilter | default true }}
    referrerPolicy: "strict-origin-when-cross-origin"
{{- end }}
{{- end }}
