apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "leprechaun.configMapName" . }}
  namespace: {{ include "leprechaun.namespace" . }}
  labels:
    {{- include "leprechaun.labels" . | nindent 4 }}
data:
  FLASK_ENV: {{ .Values.config.flaskEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REDIS_URL: {{ include "leprechaun.redisUrl" . | quote }}
  PROMETHEUS_METRICS_ENABLED: {{ .Values.config.prometheusMetricsEnabled | quote }}
  TZ: {{ .Values.config.timezone | quote }}
