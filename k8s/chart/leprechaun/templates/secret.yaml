{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leprechaun.secretName" . }}
  namespace: {{ include "leprechaun.namespace" . }}
  labels:
    {{- include "leprechaun.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.alpacaApiKey }}
  ALPACA_API_KEY: {{ .Values.secrets.alpacaApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.alpacaApiSecret }}
  ALPACA_API_SECRET: {{ .Values.secrets.alpacaApiSecret | quote }}
  {{- end }}
  ALPACA_PAPER: {{ .Values.secrets.alpacaPaper | quote }}
  {{- if .Values.secrets.redditClientId }}
  REDDIT_CLIENT_ID: {{ .Values.secrets.redditClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.redditClientSecret }}
  REDDIT_CLIENT_SECRET: {{ .Values.secrets.redditClientSecret | quote }}
  {{- end }}
  REDDIT_USER_AGENT: {{ .Values.secrets.redditUserAgent | quote }}
  {{- if .Values.secrets.finnhubApiKey }}
  FINNHUB_API_KEY: {{ .Values.secrets.finnhubApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.rapidapiKey }}
  RAPIDAPI_KEY: {{ .Values.secrets.rapidapiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.discordWebhookUrl }}
  DISCORD_WEBHOOK_URL: {{ .Values.secrets.discordWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecretKey }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  {{- end }}
{{- end }}
