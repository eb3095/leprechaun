replicaCount: 2

config:
  flaskEnv: production
  logLevel: WARNING

secrets:
  alpacaPaper: "false"

ingress:
  hosts:
    - host: leprechaun.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: leprechaun-tls
      hosts:
        - leprechaun.example.com

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
